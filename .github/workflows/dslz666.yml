name: Update Proxy dslz666

on:
  schedule:
    - cron: '30 22 * * *'  # 00:00 德黑兰
#    - cron: '30 1 * * *'  # 03:00 德黑兰
    - cron: '30 3 * * *'   # 06:00 德黑兰
    - cron: '30 7 * * *'   # 09:00 德黑兰
#    - cron: '30 10 * * *'   # 12:00 德黑兰
    - cron: '30 13 * * *'  # 15:00 德黑兰
#    - cron: '30 15 * * *'  # 18:00 德黑兰
    - cron: '30 19 * * *'  # 21:00 德黑兰
  workflow_dispatch:

# 并发控制：防止多个工作流同时运行导致冲突
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update-configs:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
      - name: 步骤1：检出仓库 (Checkout repository)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0 
      
      - name: 步骤2：安装 Python 环境 (Set up Python)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: 步骤3：安装 Python 依赖库 (Install dependencies)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 步骤4：下载并安装 Xray (Install Xray)
        run: |
          LATEST_URL=$(curl -sL "https://api.github.com/repos/XTLS/Xray-core/releases/latest" | jq -r '.assets[] | select(.name=="Xray-linux-64.zip") | .browser_download_url')
          wget -q -O xray.zip "$LATEST_URL"
          unzip -o xray.zip xray
          sudo mv xray /usr/local/bin/
          sudo chmod +x /usr/local/bin/xray
          xray version
      
      - name: 步骤5：下载并安装 Sing-box (Install sing-box)
        run: |
          LATEST_URL=$(curl -sL "https://api.github.com/repos/SagerNet/sing-box/releases/latest" | jq -r '.assets[] | select(.name | endswith("_linux_amd64.deb")) | .browser_download_url')
          wget -q -O sing-box.deb "$LATEST_URL"
          sudo dpkg -i sing-box.deb || sudo apt-get install -f -y
          SB_BIN=$(which sing-box || echo "/usr/bin/sing-box")
          sudo ln -sf "$SB_BIN" /usr/local/bin/sing-box
          sudo chmod +x /usr/local/bin/sing-box
          sing-box version
      
      - name: 步骤6：创建必要目录 (Create directories)
        run: mkdir -p assets configs
      
      - name: 步骤7：运行配置抓取脚本 (Run config fetcher)
        run: python src/fetch_configs.py
        continue-on-error: true
      
      - name: 步骤8：丰富节点地理信息 (Enrich configs)
        run: python src/enrich_configs.py configs/proxy_configs.txt configs/location_cache.json
        continue-on-error: true
      
      - name: 步骤9：重命名节点名称 (Rename configs)
        run: python src/rename_configs.py configs/location_cache.json configs/proxy_configs.txt configs/proxy_configs.txt
        continue-on-error: true

      # 跳过了原步骤10 (Xray节点测试)
      
      - name: 步骤10：转换为 Sing-box 格式 (Convert to sing-box)
        run: python src/config_to_singbox.py
      
      - name: 步骤11：备份原始配置 (Backup config)
        run: |
          if [ -f configs/singbox_configs.json ]; then
            cp configs/singbox_configs.json configs/singbox_configs_all.json
          fi
      
      - name: 步骤12：测试 Sing-box 节点可用性 (Test sing-box configs)
        run: python src/config_tester.py configs/singbox_configs_all.json configs/singbox_configs_tested.json
        continue-on-error: true
      
      - name: 步骤13：执行安全过滤 (Filter insecure)
        run: python src/security_filter.py
        continue-on-error: true
      
      - name: 步骤14：生成 Xray 负载均衡配置 (Xray balancer)
        run: python src/xray_balancer.py
        continue-on-error: true
      
      - name: 步骤15：生成统计报表和图表 (Generate charts)
        run: python src/generate_charts.py
      
      - name: 步骤16：更新 README 时间戳 (Update README)
        run: |
          timestamp=$(date +%s)
          sed -i "s/v=[0-9]*/v=$timestamp/g" README.md README_FA.md README_CN.md README_RU.md || true
      
      - name: 步骤17：提交并推送更改 (Commit and push changes)
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo "没有内容变动，跳过推送。"
            exit 0
          fi
          git commit -m "Update proxy configs, stats and reports"
          max_retries=5
          retry_count=0
          while [ $retry_count -lt $max_retries ]; do
            if git pull --rebase --autostash origin main && git push; then
              echo "推送成功！"
              exit 0
            else
              retry_count=$((retry_count + 1))
              echo "推送失败，30秒后重试 ($retry_count/$max_retries)..."
              sleep 30
            fi
          done
          exit 1
